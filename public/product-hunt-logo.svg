<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="240" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a1c" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </linearGradient>
    <linearGradient id="screenGrad" x1="120" y1="52" x2="120" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fafafa" />
      <stop offset="100%" stop-color="#e8e8ed" />
    </linearGradient>
    <linearGradient id="frameGrad" x1="120" y1="36" x2="120" y2="204" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3a3a3c" />
      <stop offset="100%" stop-color="#1d1d1f" />
    </linearGradient>
    <filter id="frameShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.5" />
    </filter>
    <filter id="glowTop" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="blur" />
    </filter>
    <filter id="glowBottom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25" result="blur" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="240" height="240" rx="48" fill="url(#bg)" />

  <!-- Subtle top-left glow -->
  <circle cx="60" cy="60" r="80" fill="#6878ff" opacity="0.06" filter="url(#glowTop)" />

  <!-- Subtle bottom-right warm glow -->
  <circle cx="180" cy="180" r="70" fill="#d4956a" opacity="0.05" filter="url(#glowBottom)" />

  <!-- Device frame -->
  <rect x="80" y="36" width="80" height="168" rx="18" fill="url(#frameGrad)" filter="url(#frameShadow)" />

  <!-- Frame highlight edge -->
  <rect x="81" y="37" width="78" height="166" rx="17" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1" />

  <!-- Screen -->
  <rect x="88" y="48" width="64" height="144" rx="12" fill="url(#screenGrad)" />

  <!-- Dynamic island -->
  <rect x="106" y="55" width="28" height="10" rx="5" fill="#1d1d1f" />

  <!-- Content lines -->
  <rect x="96" y="82" width="32" height="5" rx="2.5" fill="#c7c7cc" />
  <rect x="96" y="93" width="20" height="5" rx="2.5" fill="#d1d1d6" />

  <!-- Action button -->
  <circle cx="120" cy="120" r="8" fill="none" stroke="#c7c7cc" stroke-width="2.5" />

  <!-- Color dots at bottom of screen -->
  <circle cx="102" cy="170" r="4.5" fill="#3B3B3D" />
  <circle cx="115" cy="170" r="4.5" fill="#C2B9AE" />
  <circle cx="128" cy="170" r="4.5" fill="#7C8ACF" />
  <circle cx="141" cy="170" r="4.5" fill="#D4956A" />
</svg>
